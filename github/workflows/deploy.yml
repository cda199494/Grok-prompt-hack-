name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Or "master" if that is your branch name
  workflow_dispatch: # This adds a "Run" button to manually go live

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # This uploads everything in your repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
